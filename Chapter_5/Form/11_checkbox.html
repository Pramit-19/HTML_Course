<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkbox</title>
</head>
<body>
    <form action="">
        <table>
            <tr>
                <td><label for="c">C</label></td>
        <td><input type="checkbox" id="c" value="C" name="language"></td>
            </tr>

            <tr>
                <td><label for="c++">C++</label></td>
                <td><input type="checkbox" id="c++" value="C++" name="language"></td>
                
            </tr>
            <tr>
                <td><label for="">Java</label></td>
        <td><input type="checkbox" id="java" value="JAVA" name="language"></td>
            </tr>
            <tr>
                <td><label for="">Python</label></td>
                <td><input type="checkbox" id="python" value="PYTHON" name="language"></td>
            </tr>
        </table>
    </table>

    </form>
</body>
</html>
